<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>SAE 402 - Le palais d'été</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="shortcut icon" href="/favicon.ico" />

</head>

<body>

    <!-- navbar-->
    <nav class="flex justify-between items-center absolute top-0 left-0 right-0 z-10 p-4 w-full ">
        <div class="backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg border-white border-2">
            <h1 class="text-2xl font-bold text-white hoshiko2">SAE 402 - Le palais d'été</h1>
        </div>


        <button id="btn-china"
            class="hoshiko2 backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg hover:bg-gray-800 hover:text-white transition-colors font-medium flex items-center gap-2 cursor-pointer text-white border-white border-2">
            Aller en Chine
        </button>

    </nav>

    <!-- canvas de la map -->
    <section>
        <div id="map"></div>
    </section>

    <!-- footer -->
    <footer class="absolute bottom-0 left-0 right-0 z-10 flex justify-between items-end pointer-events-none">
        <div class="bg-white w-full p-4 rounded-t shadow-lg pointer-events-auto">
            <p class="text-sm text-gray-700">
                <span class="font-bold text-black hoshiko1">SAE - 402</span>
            </p>
            <div class="text-xs text-black italic  mt-2">
                Par <a href="https://www.linkedin.com/in/maxime-derènes-9b997932a/" alt="linkedin de Maxime Derènes"
                    class="hover:underline font-bold">Maxime Derènes</a> & <a
                    href="https://www.linkedin.com/in/sebastian-chisiu-a115bb338/" alt="linkedin de Sébastien chisiu"
                    class="hover:underline font-bold">Sébastien Chisiu</a>
            </div>
        </div>
    </footer>

    <!-- script -->
    <script>
        // token
        mapboxgl.accessToken = 'pk.eyJ1IjoibWxva3M3NyIsImEiOiJjbWw5aW5wamEwNDR5M2ZyNHZqMzZraGZ5In0.J1nH4XDo9xjP2KvduZ07_g';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12', // Style réaliste
            projection: 'globe', // Affiche la terre en 3D
            center: [0, 0], // Position de départ (océan)
            zoom: 1.5
        });

        // Effet d'atmosphère étoilée
        map.on('style.load', () => {
            map.setFog({
                color: 'rgb(186, 210, 235)', // Couleur de l'horizon
                'high-color': 'rgb(36, 92, 223)', // Couleur du ciel
                'space-color': 'rgb(11, 11, 25)' // Espace
            });
        });

        // 1. Définition de la source des données (GeoJSON des pays du monde)
        const chinaGetJSON = "https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson";

        // Fonction de zoom sur la Chine
        document.getElementById('btn-china').addEventListener('click', () => {
            map.flyTo({
                center: [104.195, 35.861], // Coordonnées centre de la Chine
                zoom: 4,
                essential: true,
                duration: 5000, // Temps du trajet en millisecondes
                curve: 1.5 // Fluidité de la courbe de vol
            });

            let opacity = 0;
            const fadeIn = setInterval(() => {
                opacity += 0.05;
                if (map.getLayer('masque-chine')) {
                    map.setPaintProperty('masque-chine', 'fill-opacity', opacity);
                }
                if (opacity >= 0.6) clearInterval(fadeIn);
            }, 100);
        });

        // ajouté pour assombrir le reste du monde
        map.on('load', () => {
            // Ajouter les données des pays
            map.addSource('pays', {
                type: 'geojson',
                data: chinaGetJSON
            });

            // Ajouter le masque pour assombrir tout SAUF la Chine
            map.addLayer({
                'id': 'masque-chine',
                'type': 'fill',
                'source': 'pays',
                'layout': {},
                'paint': {
                    'fill-color': '#000',
                    'fill-opacity': 0 // Invisible au départ
                },
                'filter': ['!=', ['get', 'ISO3166-1-Alpha-3'], 'CHN']
            });
        });

    </script>
</body>

</html>
