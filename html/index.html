<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>SAE 402 - Le palais d'été</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

    <link rel="icon" type="image/png" href="../images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="SAE402" />
    <link rel="manifest" href="../images/favicon/site.webmanifest" />

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <!-- navbar-->
    <nav class="flex justify-between items-center absolute top-0 left-0 right-0 z-10 p-4 w-full ">
        <div class="backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg border-white border-2">
            <h1 class="text-2xl font-bold text-white hoshiko2">SAE 402 - Le palais d'été</h1>
        </div>


        <button id="btn-china"
            class="hoshiko2 backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg hover:bg-gray-800 hover:text-white transition-colors font-medium flex items-center gap-2 cursor-pointer text-white border-white border-2">
            Aller en Chine
        </button>

    </nav>

    <!-- canvas de la map -->
    <section>
        <div id="map"></div>
    </section>

    <!-- footer -->
    <footer class="absolute bottom-0 left-0 right-0 z-10 flex pointer-events-none">
        <div
            class="bg-white/95 w-full p-4 rounded-t-xl shadow-lg pointer-events-auto flex justify-between items-center">

            <div class="flex items-center gap-8">
                <p class="text-sm text-gray-700">
                    <span class="font-bold text-black text-lg hoshiko1">SAE - 402</span>
                </p>

                <div class="text-xs text-black italic flex items-center gap-2">
                    <p>Par</p>
                    <a href="https://www.linkedin.com/in/maxime-derènes-9b997932a/" target="_blank"
                        class="hover:underline font-bold not-italic">Maxime Derènes</a>
                    <p>&</p>
                    <a href="https://www.linkedin.com/in/sebastian-chisiu-a115bb338/" target="_blank"
                        class="hover:underline font-bold not-italic">Sébastien Chisiu</a>
                    <p>|</p>
                    <a href="https://www.voyage-chine.com/guide-chine/attraction/palais-dete"
                        class="font-bold not-italic hover:underline">Le palais d'été</a>
                </div>
            </div>

            <div class="flex items-center">
                <img src="../images/favicon/favicon-96x96.png" alt="favicon" class="h-10 w-auto">
            </div>

        </div>
    </footer>

    <!-- script -->
    <script>
        // token
        mapboxgl.accessToken = 'pk.eyJ1IjoibWxva3M3NyIsImEiOiJjbWw5aW5wamEwNDR5M2ZyNHZqMzZraGZ5In0.J1nH4XDo9xjP2KvduZ07_g';

        // génère la map
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12', // Style réaliste
            projection: 'globe', // Affiche la terre en 3D
            center: [0, 0], // Position de départ (océan)
            zoom: 1.5
        });

        // Effet d'atmosphère
        map.on('style.load', () => {
            map.setFog({
                'color': 'rgb(30, 45, 60)',          // Horizon 
                'high-color': 'rgb(10, 20, 30)',     // Ciel
                'space-color': 'rgb(2, 4, 8)',       // Espace 
                'star-intensity': 0.6                // étoiles
            });

            // relief
            map.addSource('mapbox-dem', {
                'type': 'raster-dem',
                'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                'tileSize': 512,
                'maxzoom': 14
            });

            map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });
        });

        // désactive la rotation de la carte avec clic droit
        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();

        map.getCanvas().style.cursor = 'crosshair'; // Curseur en forme de cible

        // (GeoJSON des pays du monde)
        const chinaGetJSON = "https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson";

        const pointsInteret = [
            {
                nom: "Le Palais d'Été",
                coords: [116.27, 39.99], // Longitude, Latitude
                id: "palais-ete"
            }
        ];

        // Fonction de zoom sur la Chine
        document.getElementById('btn-china').addEventListener('click', () => {
            map.flyTo({
                center: [104.195, 35.861], // Coordonnées centre de la Chine
                zoom: 4,
                essential: true,
                duration: 5000, // Temps du trajet en millisecondes
                curve: 1.5 // Fluidité de la courbe de vol
            });

            let opacity = 0;
            const fadeIn = setInterval(() => {
                opacity += 0.05;
                if (map.getLayer('masque-chine')) {
                    map.setPaintProperty('masque-chine', 'fill-opacity', opacity);
                }
                if (opacity >= 0.6) clearInterval(fadeIn);
            }, 100);
        });

        // Ajouter les marqueurs sur la carte
        pointsInteret.forEach(poi => {
            const el = document.createElement('div');
            el.className = 'marker cursor-pointer';
            el.style.backgroundImage = 'url(../assets/icons/POI.png)'; // Ton icône
            el.style.width = '32px';
            el.style.height = '32px';
            el.style.backgroundSize = '100%';
            el.style.cursor = 'pointer';

            const marker = new mapboxgl.Marker(el)
                .setLngLat(poi.coords)
                .addTo(map);

            // ÉVÉNEMENT : Clic sur le point pour l'étape 3 (L'objet 3D)
            el.addEventListener('click', () => {
                ouvrirVue3D(poi.id);
            });
        });

        function ouvrirVue3D(id) {
            // Ici on insérera le code Three.js / webgl plus tard
        }

        map.on('load', () => {
            // Ajouter les données des pays
            map.addSource('pays', {
                type: 'geojson',
                data: chinaGetJSON
            });

            // Ajouter le masque pour assombrir tout SAUF la Chine
            map.addLayer({
                'id': 'masque-chine',
                'type': 'fill',
                'source': 'pays',
                'layout': {},
                'paint': {
                    'fill-color': '#000',
                    'fill-opacity': 0
                },
                'filter': ['!=', ['get', 'ISO3166-1-Alpha-3'], 'CHN']
            });
        });

    </script>
</body>

</html>
