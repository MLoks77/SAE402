<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>SAE 402</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <button id="btn-china">Aller en Chine 🇨🇳</button>
    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoibWxva3M3NyIsImEiOiJjbWw5aW5wamEwNDR5M2ZyNHZqMzZraGZ5In0.J1nH4XDo9xjP2KvduZ07_g';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12', // Style réaliste
            projection: 'globe', // Affiche la terre en 3D
            center: [0, 0], // Position de départ (océan)
            zoom: 1.5
        });

        // Effet d'atmosphère étoilée
        map.on('style.load', () => {
            map.setFog({
                color: 'rgb(186, 210, 235)', // Couleur de l'horizon
                'high-color': 'rgb(36, 92, 223)', // Couleur du ciel
                'space-color': 'rgb(11, 11, 25)' // Espace
            });
        });

        // Fonction de zoom sur la Chine
        document.getElementById('btn-china').addEventListener('click', () => {
            map.flyTo({
                center: [104.195, 35.861], // Coordonnées centre de la Chine
                zoom: 4,
                essential: true,
                duration: 5000, // Temps du trajet en millisecondes
                curve: 1.5 // Fluidité de la courbe de vol
            });
        });
    </script>
</body>

</html>
