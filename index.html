<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>SAE 402 - Le palais d'été</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

    <link rel="icon" type="image/png" href="images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="SAE402" />
    <link rel="manifest" href="images/favicon/site.webmanifest" />

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <nav class="flex justify-between items-center absolute top-0 left-0 right-0 z-10 p-4 w-full ">
        <div class="backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg border-white border-2">
            <h1 class="text-2xl font-bold text-white hoshiko2">SAE 402 - Le palais d'été</h1>
        </div>
        <div class="flex gap-3">
            <button id="btn-tour"
                class="hoshiko2 backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg hover:bg-gray-800 hover:text-white transition-colors font-medium flex items-center gap-2 cursor-pointer text-white border-white border-2">
                La Tour
            </button>
            <button id="btn-bateau"
                class="hoshiko2 backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg hover:bg-gray-800 hover:text-white transition-colors font-medium flex items-center gap-2 cursor-pointer text-white border-white border-2">
                Le Bateau
            </button>

            <button id="btn-china"
                class="hoshiko2 backdrop-blur-sm px-6 py-3 rounded-lg shadow-lg hover:bg-gray-800 hover:text-white transition-colors font-medium flex items-center gap-2 cursor-pointer text-white border-white border-2">
                Aller à Pékin
            </button>
        </div>
    </nav>

    <section>
        <div id="map" style="width: 100%; height: 100vh;"></div>
    </section>

    <div id="modal-palais-ete" class="modal-container fixed inset-0 z-50 flex bg-black/50 hidden">
        <div
            class="contenu-modal absolute bg-white rounded-xl shadow-2xl w-64 h-64 overflow-hidden border border-white">
            <img src="images/palaisete.webp" alt="Palais d'été" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 z-10 bg-black/40"></div>
            <div class="absolute bottom-0 z-20">
                <h1 class="text-white text-md font-bold pl-4 pb-5 underline">La Tour <br>de l'Encens Bouddhiste</h1>
            </div>
            <div class="absolute bottom-4 right-4 z-30">
                <button onclick="window.location.href='Modele3D/latour.html'"
                    class="bg-white hover:bg-gray-300 transition-colors rounded-full p-2 shadow-lg cursor-pointer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
            <button class="fermer-modal cursor-pointer absolute top-3 right-3 text-white/80 hover:text-white z-10">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <div id="modal-bateau-marbre" class="modal-container fixed inset-0 z-50 flex bg-black/50 hidden">
        <div
            class="contenu-modal absolute bg-white rounded-xl shadow-2xl w-64 h-64 overflow-hidden border border-white">
            <img src="images/bateaumarbre.webp" alt="Bateau de marbre"
                class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 z-10 bg-black/40"></div>
            <div class="absolute bottom-0 z-20">
                <h1 class="text-white text-md font-bold pl-4 pb-5 underline">Le bateau <br>de marbre</h1>
            </div>
            <div class="absolute bottom-4 right-4 z-30">
                <button onclick="window.location.href='Modele3D/bateaumarbre.html'"
                    class="bg-white hover:bg-gray-300 transition-colors rounded-full p-2 shadow-lg cursor-pointer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
            <button class="fermer-modal cursor-pointer absolute top-3 right-3 text-white/80 hover:text-white z-10">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <footer class="absolute bottom-0 left-0 right-0 z-10 flex pointer-events-none">
        <div
            class="bg-white/95 w-full p-4 rounded-t-xl shadow-lg pointer-events-auto flex justify-between items-center">
            <div class="flex items-center gap-8">
                <p class="text-sm text-gray-700"><span class="font-bold text-black text-lg hoshiko1">SAE - 402</span>
                </p>
                <div class="text-xs text-black italic flex items-center gap-2">
                    <p>Par</p>
                    <a href="https://www.linkedin.com/in/maxime-derènes-9b997932a/" target="_blank"
                        class="hover:underline font-bold not-italic">Maxime Derènes</a>
                    <p>&</p>
                    <a href="https://www.linkedin.com/in/sebastian-chisiu-a115bb338/" target="_blank"
                        class="hover:underline font-bold not-italic">Sébastien Chisiu</a>
                </div>
            </div>
            <img src="images/favicon/favicon-96x96.png" alt="favicon" class="h-10 w-auto">
        </div>
    </footer>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoibWxva3M3NyIsImEiOiJjbWw5aW5wamEwNDR5M2ZyNHZqMzZraGZ5In0.J1nH4XDo9xjP2KvduZ07_g';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12',
            projection: 'globe',
            center: [104.195, 35.861],
            zoom: 1.5
        });

        map.on('style.load', () => {
            map.setFog({
                'color': 'rgb(30, 45, 60)',
                'high-color': 'rgb(10, 20, 30)',
                'space-color': 'rgb(2, 4, 8)',
                'star-intensity': 0.6
            });
            map.addSource('mapbox-dem', {
                'type': 'raster-dem',
                'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                'tileSize': 512,
                'maxzoom': 14
            });
            map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });
        });

        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();
        map.getCanvas().style.cursor = 'crosshair';

        const pointsInteret = [
            {
                nom: "La Tour de l'Encens Bouddhiste",
                coords: [116.2680850, 39.9980],
                id: "modal-palais-ete"
            },
            {
                nom: "Le Bateau de Marbre",
                coords: [116.26358, 39.99678], // Attention : Longitude, Latitude 
                id: "modal-bateau-marbre"
            }
        ];

        document.getElementById('btn-china').addEventListener('click', () => {
            map.flyTo({ center: [116.4074, 39.9042], zoom: 12, duration: 5000, essential: true });
        });
        document.getElementById('btn-tour').addEventListener('click', () => {
            map.flyTo({ center: [116.2684850, 39.9980244], zoom: 18, duration: 10000, essential: true });
        });
        document.getElementById('btn-bateau').addEventListener('click', () => {
            map.flyTo({ center: [116.26358, 39.99678], zoom: 18, duration: 10000, essential: true });
        });

        pointsInteret.forEach(poi => {
            const el = document.createElement('div');
            el.className = 'marker cursor-pointer';
            el.innerHTML = `
                <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.7C12 21.7 20 14 20 9C20 4.58172 16.4183 1 12 1C7.58172 1 4 4.58172 4 9C4 14 12 21.7 12 21.7Z" fill="#E11D48" stroke="white" stroke-width="1.5"/>
                    <circle cx="12" cy="9" r="3" fill="white"/>
                </svg>`;

            new mapboxgl.Marker(el).setLngLat(poi.coords).addTo(map);

            el.addEventListener('click', () => {
                fermerTousLesModals();
                const targetModal = document.getElementById(poi.id);
                const contenu = targetModal.querySelector('.contenu-modal');

                targetModal.classList.remove('hidden');

                // Positionnement dynamique
                const point = map.project(poi.coords);
                const gap = 20;
                const margin = 20;

                let left = point.x + gap;
                let top = point.y - (contenu.offsetHeight / 2);

                if (left + contenu.offsetWidth > window.innerWidth - margin) {
                    left = point.x - contenu.offsetWidth - gap;
                }

                contenu.style.left = Math.max(margin, left) + 'px';
                contenu.style.top = Math.max(margin, Math.min(top, window.innerHeight - contenu.offsetHeight - margin)) + 'px';
            });
        });

        function fermerTousLesModals() {
            document.querySelectorAll('.modal-container').forEach(m => m.classList.add('hidden'));
        }

        // Fermer au clic sur les boutons X ou sur le fond noir
        document.querySelectorAll('.fermer-modal').forEach(btn => {
            btn.addEventListener('click', fermerTousLesModals);
        });

        document.querySelectorAll('.modal-container').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) fermerTousLesModals();
            });
        });

        map.on('load', () => {
            map.addSource('pays', { type: 'geojson', data: "https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson" });
            map.addLayer({
                'id': 'masque-chine',
                'type': 'fill',
                'source': 'pays',
                'paint': { 'fill-color': '#000', 'fill-opacity': 0 },
                'filter': ['!=', ['get', 'ISO3166-1-Alpha-3'], 'CHN']
            });
        });

        map.on('zoom', () => {
            if (map.getLayer('masque-chine')) {
                const z = map.getZoom();
                let op = Math.max(0, Math.min(0.7, (z - 2.5) / 2));
                map.setPaintProperty('masque-chine', 'fill-opacity', op);
            }
        });

    </script>
</body>

</html>
